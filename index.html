<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>POC 서버 모니터</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POC 모니터">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="top">
  <div class="bar">
    <h1>POC 서버 모니터</h1>
    <span id="src" class="src"></span>
  </div>
  <div class="summary">
    <b id="totccu">–</b><span class="lbl">동접</span>
    <b id="cnt">–</b><span class="lbl">서버</span>
    <span id="updated" class="updated"></span>
  </div>
  <div class="controls">
    <input id="filter" type="search" inputmode="search" placeholder="검색 (서버번호 / 이름)" autocomplete="off">
    <div class="sorts" id="sorts">
      <button class="sortbtn active" data-key="num">번호</button>
      <button class="sortbtn" data-key="ccu">동접</button>
      <button class="sortbtn" data-key="fps">FPS</button>
    </div>
  </div>
  <div class="row head">
    <span class="c-pin"></span>
    <span class="c-name">서버</span>
    <span class="c-ccu">동접</span>
    <span class="c-fps">FPS</span>
    <span class="c-cpu">CPU</span>
    <span class="c-mem">MEM</span>
  </div>
</header>

<main>
  <div id="banner" class="banner" hidden></div>
  <div id="list"></div>
</main>

<footer id="foot"></footer>

<script src="app.js"></script>
</body>
</html>
